name: Update SP500 Data

on:
  schedule:
    # UTC 기준 평일 22:00 실행 (한국시간 다음날 07:00)
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

jobs:
  update-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # SEC_CONTACT_EMAIL: 로컬은 .env — Actions에는 Secret 또는 Variable로만 전달됨(.env 미사용).
      # Secret 이름: SEC_CONTACT_EMAIL (Repository secrets 권장) 또는 Variable 동일 이름.
      - name: Generate latest data.json
        env:
          SEC_CONTACT_EMAIL: ${{ secrets.SEC_CONTACT_EMAIL || vars.SEC_CONTACT_EMAIL }}
          CONSTITUENTS_CSV_URLS: ${{ vars.CONSTITUENTS_CSV_URLS }}
          OUT_FILE: ./data.json
          YAHOO_BATCH_SIZE: 40
          SEC_REQUEST_DELAY_MS: 150
        run: node ./scripts/update-data.js

      - name: Upload to Supabase Storage (upsert)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ vars.SUPABASE_BUCKET }}
          SUPABASE_OBJECT_PATH: ${{ vars.SUPABASE_OBJECT_PATH }}
        run: |
          curl -X POST \
            "${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/${SUPABASE_OBJECT_PATH}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "x-upsert: true" \
            --data-binary "@data.json"
